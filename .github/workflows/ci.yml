name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

env:
  POETRY_VERSION: "2.4.1"
  POETRY_NO_INTERACTION: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test:
    name: Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7


      - name: Install Poetry
        run: pipx install "poetry==${POETRY_VERSION}"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry
          cache-dependency-path: poetry.lock

      - name: Display versions
        run: |
          python --version
          poetry --version
          poetry env info

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest --tb=short


  package-check:
    name: Validate package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Poetry
        run: pipx install "poetry==${POETRY_VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Validate project metadata
        run: poetry check --strict

      - name: Build wheel and source distribution
        run: poetry build --clean

      - name: Show built distributions
        run: ls -lh dist/

      - name: Test wheel installation
        run: |
          python -m venv .package-test
          .package-test/bin/python -m pip install --upgrade pip
          .package-test/bin/python -m pip install dist/*.whl
          .package-test/bin/python -c "import bilevelpy; print(f'Imported BilevelPy from: {bilevelpy.__file__}')"


  docs-build:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Poetry
        run: pipx install "poetry==${POETRY_VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock

      - name: Install documentation dependencies
        run: poetry install --with docs --no-interaction

      - name: Build documentation
        run: poetry run mkdocs build --strict

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site


  docs-deploy:
    name: Deploy documentation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs:
      - test
      - package-check
      - docs-build

    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      pages: write
      id-token: write

    concurrency:
      group: github-pages
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5